name: Build release artifacts

on:
  release:
    types:
      - published

env:
  PICO_SDK_REF: 2.2.0
  TINYUSB_REF: 0.20.0
  PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk

permissions:
  contents: write

jobs:
  firmware:
    name: Build and upload companion UF2
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake python3 build-essential gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib ninja-build

      - name: Download Pico SDK
        run: |
          git clone --depth 1 --branch "$PICO_SDK_REF" https://github.com/raspberrypi/pico-sdk.git "$PICO_SDK_PATH"
          git -C "$PICO_SDK_PATH" submodule update --init --recursive

      - name: Switch TinyUSB to configured tag
        run: |
          if ! git -C "$PICO_SDK_PATH/lib/tinyusb" rev-parse -q --verify "refs/tags/$TINYUSB_REF" >/dev/null; then
            git -C "$PICO_SDK_PATH/lib/tinyusb" fetch --depth 1 origin "refs/tags/$TINYUSB_REF:refs/tags/$TINYUSB_REF"
          fi
          git -C "$PICO_SDK_PATH/lib/tinyusb" checkout --detach "$TINYUSB_REF"

      - name: Build companion firmware
        run: |
          cmake -S . -B build/companion -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DPICO_SDK_PATH="$PICO_SDK_PATH" \
            -DENABLE_COMPANION=ON
          cmake --build build/companion --target ds5-bridge
          mkdir -p artifacts
          cp build/companion/ds5-bridge.uf2 "artifacts/ds5-bridge-companion-${{ github.event.release.tag_name }}.uf2"

      - name: Upload UF2 file to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" artifacts/*.uf2 --clobber

  companion-installer:
    name: Build and upload Windows companion installer
    runs-on: windows-latest

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: companion/package-lock.json

      - name: Install companion dependencies
        working-directory: companion
        run: npm ci

      - name: Build Windows companion installer
        working-directory: companion
        run: npm run installer:win

      - name: Upload Windows companion installer to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem companion/artifacts/installer/DS5-Bridge-Companion-Setup-*.exe | Select-Object -First 1
          gh release upload "${{ github.event.release.tag_name }}" $installer.FullName --clobber
